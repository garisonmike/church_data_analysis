name: Build Release

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'


jobs:

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

  build-web-docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/garisonmike/church-analytics-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref_type == 'tag' || github.ref_name == 'main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs:
      - build-android
      - build-windows
    runs-on: ubuntu-latest

    permissions:
      contents: write

    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-assets/windows

      - name: Zip Windows build
        run: |
          cd release-assets
          zip -r ChurchAnalytics-Windows.zip windows

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Compute SHA-256 checksums
        id: checksums
        run: |
          echo "apk=$(sha256sum release-assets/app-release.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "windows=$(sha256sum release-assets/ChurchAnalytics-Windows.zip | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Stamp update.json with version and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APK_HASH: ${{ steps.checksums.outputs.apk }}
          WIN_HASH: ${{ steps.checksums.outputs.windows }}
        run: |
          python3 - <<'EOF'
          import json, os

          version = os.environ['VERSION']
          apk_hash = os.environ['APK_HASH']
          win_hash = os.environ['WIN_HASH']
          base_url = f'https://github.com/GarisonMike/church_data_analysis/releases/download/v{version}'

          with open('docs/update.json') as f:
              manifest = json.load(f)

          manifest['version'] = version
          manifest['platforms']['android']['download_url'] = f'{base_url}/app-release.apk'
          manifest['platforms']['android']['sha256'] = apk_hash
          manifest['platforms']['windows']['download_url'] = f'{base_url}/ChurchAnalytics-Windows.zip'
          manifest['platforms']['windows']['sha256'] = win_hash

          with open('release-assets/update.json', 'w') as f:
              json.dump(manifest, f, indent=4)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/app-release.apk
            release-assets/ChurchAnalytics-Windows.zip
            release-assets/update.json
          body: |
            ## Church Analytics v${{ steps.version.outputs.version }}
            
            **Release Assets:**
            - Android APK (`app-release.apk`)
            - Windows Build (`ChurchAnalytics-Windows.zip`)
            - Update manifest (`update.json`) — used by in-app update detection
            
            **Full Release Notes:**
            See `docs/update.json` for detailed release notes.
          draft: false
          prerelease: false